<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>%TITLE%</title>
%BF_STYLES%
<link rel="stylesheet" href="/preview/editor.css">
</head>
<body class="bf-theme bf-tier-os is-dark dg-preview">
<div class="bf-application dg-preview-app" data-dg-shell="true">
  <nav class="bf-navigation is-pinned dg-component-navigation" id="dg-component-navigation" aria-label="Components">
    <div class="bf-navigation-overlay" aria-hidden="true"></div>
    <div class="bf-navigation-drawer">
      <section class="bf-panel is-fill dg-component-panel">
        <div class="bf-panel-header is-sticky dg-nav-tabs-header">
          <div class="bf-tabs dg-nav-tabs">
            <ul class="bf-tabs-list" role="tablist" aria-label="Left sidebar view">
              <li class="bf-tabs-item"><button class="bf-tabs-link dg-nav-tab is-active" id="nav-tab-browse" type="button" role="tab" aria-selected="true" aria-controls="nav-pane-browse" tabindex="0">Browse</button></li>
              <li class="bf-tabs-item"><button class="bf-tabs-link dg-nav-tab" id="nav-tab-layers" type="button" role="tab" aria-selected="false" aria-controls="nav-pane-layers" tabindex="-1">Layers</button></li>
            </ul>
          </div>
        </div>
        <div class="bf-panel-content dg-component-panel-content">
          <div class="dg-nav-pane is-active" id="nav-pane-browse" role="tabpanel" aria-labelledby="nav-tab-browse">
            %BROWSE_NAV%
          </div>
          <div class="dg-nav-pane" id="nav-pane-layers" role="tabpanel" aria-labelledby="nav-tab-layers" hidden>
            <div class="tree dg-component-tree" id="tree"></div>
          </div>
        </div>
      </section>
    </div>
    <div class="bf-application-navigation-resize-handle" role="separator" tabindex="0" aria-controls="dg-component-navigation" aria-label="Resize components panel" aria-orientation="vertical"></div>
  </nav>
  <main class="bf-main dg-preview-main">
    <div class="dg-stage-shell" id="stage-shell" data-view-mode="output">
      <div class="dg-view-controls" id="view-controls">
        <div class="bf-tabs dg-view-tabs">
          <ul class="bf-tabs-list" role="tablist" aria-label="Diagram preview mode">
            <li class="bf-tabs-item"><button class="bf-tabs-link dg-view-tab" id="view-tab-input" type="button" data-view-mode="input" role="tab" aria-selected="false" aria-controls="input-pane" tabindex="-1">Input</button></li>
            <li class="bf-tabs-item"><button class="bf-tabs-link dg-view-tab" id="view-tab-output" type="button" data-view-mode="output" role="tab" aria-selected="true" aria-controls="output-pane" tabindex="0">Output</button></li>
            <li class="bf-tabs-item"><button class="bf-tabs-link dg-view-tab" id="view-tab-both" type="button" data-view-mode="both" role="tab" aria-selected="false" aria-controls="stage-layout" tabindex="-1">Both</button></li>
          </ul>
        </div>
        <button class="bf-button is-base is-icon dg-split-toggle" id="split-toggle" type="button" aria-label="Toggle horizontal/vertical split" title="Toggle horizontal/vertical split" style="display:none">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true" class="dg-split-icon dg-split-icon--horizontal"><rect x="1" y="2" width="6" height="12" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="9" y="2" width="6" height="12" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true" class="dg-split-icon dg-split-icon--vertical"><rect x="2" y="1" width="12" height="6" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="2" y="9" width="12" height="6" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        </button>
      </div>
      <div class="dg-stage-layout" id="stage-layout">
        <section class="dg-preview-pane dg-input-pane" id="input-pane" aria-label="Input sketch">
          <div class="dg-preview-pane-header">
            <span class="dg-preview-pane-label">Input</span>
          </div>
          <div class="dg-reference-img-wrap">
            <img class="dg-reference-img" id="reference-img" alt="Rough input sketch">
          </div>
        </section>
        <section class="dg-preview-pane dg-output-pane" id="output-pane" aria-label="Generated output">
          <div class="dg-preview-pane-header">
            <span class="dg-preview-pane-label">Output</span>
          </div>
          <div class="stage" id="stage"></div>
        </section>
      </div>
    </div>
  </main>
  <aside class="bf-aside is-pinned is-medium dg-preview-aside" id="dg-preview-aside">
    <div class="bf-application-aside-resize-handle" role="separator" tabindex="0" aria-controls="dg-preview-aside" aria-label="Resize inspector panel" aria-orientation="vertical"></div>
    <section class="sidebar bf-panel is-fill dg-sidebar-panel">
      <div class="bf-panel-header is-sticky dg-sidebar-header">
        <a class="nav-back" href="/">&#x2190; all previews</a>
        <label class="bf-field dg-diagram-picker-field" for="diagram-picker">
          <span class="bf-form-label">Preview</span>
          <span class="bf-control dg-picker-row">
            <select class="bf-input dg-diagram-picker" id="diagram-picker" aria-label="Select preview">%NAV_LINKS%</select>
            <span class="dg-picker-nav">
              <button class="bf-button is-base is-icon" id="diagram-prev" aria-label="Previous diagram" title="Previous diagram"><span class="bf-icon is-chevron-left" aria-hidden="true"></span></button>
              <button class="bf-button is-base is-icon" id="diagram-next" aria-label="Next diagram" title="Next diagram"><span class="bf-icon is-chevron-right" aria-hidden="true"></span></button>
            </span>
          </span>
        </label>
        <div class="build-status build-ok" id="build-status">Watching for changes&#x2026;</div>
      </div>
      <div class="bf-panel-content dg-sidebar-content">
        <section class="dg-sidebar-section">
          <h2 class="dg-section-heading bf-h5">Selection</h2>
          <div class="inspector" id="inspector">
            <p class="dg-empty-message bf-form-help">Click a component to inspect it.</p>
          </div>
        </section>

        <section class="dg-sidebar-section">
          <h2 class="dg-section-heading bf-h5">Grid</h2>
          <div class="grid-controls" id="grid-controls">
            <label class="bf-field dg-grid-field" for="grid-cols">
              <span class="bf-form-label">Columns</span>
              <span class="bf-control dg-grid-control"><input class="bf-input dg-number-input" type="number" id="grid-cols" min="1" max="20" value="1"><span class="dg-grid-unit">cols</span></span>
            </label>
            <label class="bf-field dg-grid-field" for="grid-rows">
              <span class="bf-form-label">Rows</span>
              <span class="bf-control dg-grid-control"><input class="bf-input dg-number-input" type="number" id="grid-rows" min="1" max="40" value="1" readonly><span class="dg-grid-unit">rows</span></span>
            </label>
            <label class="bf-field dg-grid-field" for="grid-col-gap">
              <span class="bf-form-label">Col gutter</span>
              <span class="bf-control dg-grid-control"><input class="bf-input dg-number-input" type="number" id="grid-col-gap" min="0" max="128" step="8" value="24"><span class="dg-grid-unit">px</span></span>
            </label>
            <label class="bf-field dg-grid-field" for="grid-row-gap">
              <span class="bf-form-label">Row gutter</span>
              <span class="bf-control dg-grid-control"><input class="bf-input dg-number-input" type="number" id="grid-row-gap" min="0" max="128" step="8" value="24"><span class="dg-grid-unit">px</span></span>
            </label>
            <label class="bf-field dg-grid-field is-full-span" for="grid-margin">
              <span class="bf-form-label">Page gap</span>
              <span class="bf-control dg-grid-control"><input class="bf-input dg-number-input" type="number" id="grid-margin" min="0" max="128" step="8" value="24" readonly><span class="dg-grid-unit">px</span></span>
            </label>
          </div>
        </section>

        <section class="dg-sidebar-section">
          <h2 class="dg-section-heading bf-h5">Overrides</h2>
          <p class="bf-form-help dg-override-summary" id="override-summary">No overrides.</p>
          <div class="bf-cluster dg-button-row">
            <button class="btn bf-button" id="btn-save" disabled>Save</button>
            <button class="btn bf-button is-base" id="btn-save-svg">Save SVG</button>
            <button class="btn bf-button is-base" id="btn-undo" disabled>Undo</button>
            <button class="btn bf-button is-base" id="btn-redo" disabled>Redo</button>
            <button class="btn bf-button is-base" id="btn-clear-all">Clear all</button>
            <button class="btn bf-button is-base" id="btn-export">Copy overrides</button>
          </div>
        </section>

        <section class="dg-sidebar-section">
          <h2 class="dg-section-heading bf-h5">Constraints</h2>
          <div class="build-status build-ok" id="constraint-status">No violations</div>
        </section>
      </div>
    </section>
  </aside>
</div>
<div class="guide-badge" id="guide-badge"></div>
<script>%CONFIG_SCRIPT%</script>
<script src="/preview/box-styles.js"></script>
<script src="/preview/component-model.js"></script>
<script src="/preview/constraints.js"></script>
<script src="/preview/editor.js"></script>
</body>
</html>
