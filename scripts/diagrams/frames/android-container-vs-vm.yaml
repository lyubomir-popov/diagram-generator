engine: v3
title: "Container vs VM — Android architecture comparison"
grid:
  cols: 3
root:
  id: page
  direction: vertical
  padding: 24
  children:
    # Top zone — headers + content in aligned columns
    - id: top_zone
      direction: horizontal
      children:
        - id: col_container_top
          direction: vertical
          heading: Containerized Android
          children:
            - id: anbox_container
              direction: vertical
              heading: Anbox Instance
              children:
                - id: android_sys_c
                  label: [Android System, (App/Framework/API)]
                - id: android_rt_c
                  label: [Android Runtime]

        - id: col_vm_top
          direction: vertical
          heading: Virtualized Android
          children:
            - id: anbox_vm
              direction: vertical
              heading: Anbox Instance
              children:
                - id: android_sys_v
                  label: [Android System, (App/Framework/API)]
                - id: android_rt_v
                  label: [Android Runtime]
                - id: android_kernel
                  label: [Android Kernel]

        - id: note_top
          label: [Android owns, everything above]
          variant: annotation
          sizing_w: hug

    # Kernel boundary separator
    - id: kernel_boundary
      label: [Kernel boundary]
      role: separator
      sizing_h: hug

    # Bottom zone — below kernel boundary
    - id: bottom_zone
      direction: horizontal
      children:
        - id: host_container
          direction: vertical
          heading: "Host OS & Hardware (Kernel, GPU, drivers)"
          children:
            - id: host_kernel_c
              label: [Host Linux Kernel, (shared kernel)]
            - id: host_hw_c
              label: [Host hardware]

        - id: host_vm
          direction: vertical
          heading: "Host OS & Hardware (Kernel, GPU, drivers)"
          children:
            - id: host_kernel_v
              label: [Host Linux Kernel]
            - id: host_hw_v
              label: [Host hardware]

        - id: note_bottom
          label: [Android has no, control below]
          variant: annotation
          sizing_w: hug
