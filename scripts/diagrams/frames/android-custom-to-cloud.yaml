engine: v3
title: "Custom Android to Anbox Cloud"
grid:
  cols: 4
  col_gap: 32
arrows:
  - source: custom_files
    target: host_tools
  - source: host_tools
    target: anbox_cloud
  - source: anbox_cloud
    target: virt_instance
root:
  id: page
  direction: horizontal
  gap: 32
  padding: 24
  children:
    # Col 0: Custom Android files
    - id: custom_files
      level: 3
      direction: vertical
      gap: 8
      padding: 8
      heading: "Custom Android files"
      children:
        - id: partitions
          level: 2
          direction: vertical
          gap: 8
          padding: 8
          heading: "Partitions"
          children:
            - id: system_image
              label: [Android system image]
            - id: kernel
              label: [Kernel]

    # Col 1: Host-side tools
    - id: host_tools
      level: 3
      direction: vertical
      gap: 24
      padding: 8
      heading: "Host-side tools"
      children:
        - id: cvd
          label: [cvd]
        - id: launchers
          label: [Launchers]

    # Col 2: Anbox Cloud
    - id: anbox_cloud
      level: 3
      label:
        - {text: Anbox Cloud, weight: "700"}
        - "- Consumes system images"
        - "- Consumes host-side tools"
      icon: Cloud.svg

    # Col 3: Virtualized Android instance
    - id: virt_instance
      level: 3
      label:
        - {text: Virtualized Android instance, weight: "700"}
        - "- Unmodified"
        - "  Cuttlefish-based Android"
        - "- No rebuild required"
      icon: Virtual machine.svg
