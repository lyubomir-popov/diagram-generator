engine: v3
title: "Diagram language workflow"
grid:
  cols: 1
arrows:
  - source: inputs
    target: redraw
  - source: redraw
    target: generators
  - source: generators
    target: validate
  - source: validate
    target: review
  - source: review
    target: drawio
  - source: drawio
    target: outputs
root:
  id: page
  direction: vertical
  padding: 24
  variant: annotation
  children:
    # Dashed input frame with three source boxes
    - id: inputs
      direction: horizontal
      padding: 8
      heading: "Inputs and canonical context"
      children:
        - id: src_rough
          label: [Rough source, diagram]
          icon: Document.svg
        - id: src_refs
          label: [Local refs, "+ outputs"]
          icon: Document with Magnifying glass.svg
        - id: src_spec
          label:
            - {text: DIAGRAM.md, weight: "700"}
            - canonical spec
          variant: highlight
          icon: Book with Magnifying glass.svg

    - id: redraw
      label:
        - {text: Diagram redraw, weight: "700"}
        - skill
      variant: highlight
      icon: Wrench 1.svg

    - id: generators
      label:
        - {text: Repo generators, weight: "700"}
        - {text: "shared tokens + library", fill: "#666666"}
      icon: Screen with code.svg

    - id: validate
      label:
        - {text: Build + validate, weight: "700"}
        - skill
      variant: highlight
      icon: Rosette with check.svg

    - id: review
      label:
        - {text: Compare + review lane, weight: "700"}
        - {text: "before / agent / refined", fill: "#666666"}
      icon: Document with Magnifying glass.svg

    - id: drawio
      label:
        - {text: Protected draw.io, weight: "700"}
        - review skill
      variant: highlight
      icon: Design.svg

    - id: outputs
      label:
        - {text: Editable draw.io +, weight: "700"}
        - SVG outputs
        - {text: "ready for token ingest", fill: "#666666"}
      icon: Storage image.svg
