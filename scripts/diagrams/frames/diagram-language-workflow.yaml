engine: v3
title: "Diagram language workflow"
grid:
  cols: 1
arrows:
  - source: inputs
    target: redraw
  - source: redraw
    target: generators
  - source: generators
    target: validate
  - source: validate
    target: review
  - source: review
    target: drawio
  - source: drawio
    target: outputs
root:
  id: page
  direction: vertical
  padding: 24
  variant: annotation
  children:
    # Dashed input frame with three source boxes
    - id: inputs
      level: 2
      direction: horizontal
      padding: 8
      heading: "Inputs and canonical context"
      children:
        - id: src_rough
          label: [Rough source, diagram]
          icon: Document.svg
        - id: src_refs
          label: [Local refs, "+ outputs"]
          icon: Document with Magnifying glass.svg
        - id: src_spec
          heading: "DIAGRAM.md"
          label:
            - canonical spec
          variant: highlight
          icon: Book with Magnifying glass.svg

    - id: redraw
      level: 2
      heading: "Diagram redraw"
      label:
        - skill
      variant: highlight
      icon: Wrench 1.svg

    - id: generators
      level: 2
      heading: "Repo generators"
      label:
        - {text: "shared tokens + library", style: muted}
      icon: Screen with code.svg

    - id: validate
      level: 2
      heading: "Build + validate"
      label:
        - skill
      variant: highlight
      icon: Rosette with check.svg

    - id: review
      level: 2
      heading: "Compare + review lane"
      label:
        - {text: "before / agent / refined", style: muted}
      icon: Document with Magnifying glass.svg

    - id: drawio
      level: 2
      heading: "Protected draw.io"
      label:
        - review skill
      variant: highlight
      icon: Design.svg

    - id: outputs
      level: 2
      heading: "Editable draw.io +"
      label:
        - SVG outputs
        - {text: "ready for token ingest", style: muted}
      icon: Storage image.svg
