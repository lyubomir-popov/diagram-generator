engine: v3
title: "GPU waiting scheduler"
grid:
  cols: 4
arrows:
  - source: gpu
    target: scheduler
root:
  id: page
  direction: vertical
  padding: 24
  variant: annotation
  children:
    # Row 0: scheduler box (right, spanning 3 cols)
    - id: row0
      direction: horizontal
      variant: annotation
      children:
        - id: spacer0
          variant: annotation
          label: []
          sizing_h: hug
        - id: scheduler
          heading: "Scheduler"
          label:
            - AI inference
            - request
          icon: Desktop monitor.svg
          fill_weight: 3

    # Row 1: document icon + annotation
    - id: row1
      direction: horizontal
      variant: annotation
      children:
        - id: spacer1
          variant: annotation
          label: []
          sizing_h: hug
        - id: doc_icon
          icon: Document.svg
          label: []
          variant: annotation
          sizing_w: hug
        - id: queued
          label:
            - {text: Queued request, style: muted}
          variant: annotation
          sizing_w: hug

    # Row 2: gauge icon (left)
    - id: row2
      direction: horizontal
      children:
        - id: gauge_icon
          icon: Gauge.svg
          label: []
          variant: annotation
          sizing_w: hug

    # Row 3: GPU box (left)
    - id: row3
      direction: horizontal
      variant: annotation
      children:
        - id: gpu
          heading: "GPU"
          icon: CPU.svg
          sizing_w: hug

    # Row 4: waiting annotation (left)
    - id: row4
      direction: horizontal
      variant: annotation
      children:
        - id: waiting
          heading: "Waiting..."
          variant: annotation
          sizing_w: hug
