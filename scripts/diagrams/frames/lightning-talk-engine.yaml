engine: v3
title: "Design-language engine"
grid:
  cols: 4
  row_gap: 32
arrows:
  - source: input_dg
    target: engine
  - source: input_a4
    target: engine
  - source: input_blo
    target: engine
  - source: spec_typo
    target: engine
  - source: spec_spacing
    target: engine
  - source: spec_grid
    target: engine
  - source: engine
    target: editor
  - source: editor
    target: out_svg
  - source: editor
    target: out_pdf
  - source: editor
    target: out_mp4
root:
  id: page
  direction: vertical
  gap: 32
  padding: 24
  variant: annotation
  children:
    # Row 0: input formats (right side, with left spacer)
    - id: row0
      direction: horizontal
      gap: 24
      variant: annotation
      children:
        - id: spacer_top
          variant: annotation
          label: []
          sizing_h: hug
        - id: input_dg
          label: [Rough, diagram]
          icon: Design.svg
        - id: input_a4
          label: [Copydoc]
          icon: Document.svg
        - id: input_blo
          label: [Marketing, brief]
          icon: Marketing.svg

    # Rows 1-3: specs (left) + engine panel (right spanning 3 cols)
    - id: main_row
      direction: horizontal
      gap: 24
      children:
        - id: specs_col
          direction: vertical
          gap: 32
          variant: annotation
          children:
            - id: spec_typo
              label: [Typography, spec]
              icon: Documents.svg
            - id: spec_spacing
              label: [Spacing, spec]
              icon: Documents.svg
            - id: spec_grid
              label: [Grid, spec]
              icon: Documents.svg
        - id: engine
          direction: horizontal
          gap: 8
          padding: 8
          fill_weight: 3
          heading: "Design-language engine"
          children:
            - id: eng_dg
              label: [Diagram, generator]
              icon: Blueprint.svg
            - id: eng_a4
              label: [A4, generator]
              icon: Document management.svg
            - id: eng_blo
              label: [Brand layout, ops]
              icon: Composable.svg

    # Row 4: editor (right side)
    - id: row4
      direction: horizontal
      gap: 24
      variant: annotation
      children:
        - id: spacer_editor
          label: []
          sizing_h: hug
        - id: editor
          label: [Constrained, editor]
          icon: Laptop with code.svg

    # Row 5: output files (right side)
    - id: row5
      direction: horizontal
      gap: 24
      variant: annotation
      children:
        - id: spacer_outputs
          variant: annotation
          label: []
          sizing_h: hug
        - id: out_svg
          label: [SVG]
          icon: Design.svg
        - id: out_pdf
          label: [PDF]
          icon: Document.svg
        - id: out_mp4
          label: [MP4 / PNG]
          icon: Video.svg
