engine: v3
title: "A4 generator"
grid:
  cols: 3
  col_gap: 32
arrows:
  - source: input_panel
    target: engine
  - source: guidelines
    target: engine
  - source: engine
    target: export_panel
root:
  id: page
  direction: vertical
  padding: 24
  variant: annotation
  children:
    # Row 0: input panel (right side, aligned with engine)
    - id: row0
      direction: horizontal
      variant: annotation
      children:
        - id: spacer0
          variant: annotation
          label: []
          sizing_h: hug
        - id: input_panel
          direction: horizontal
          padding: 8
          fill_weight: 2
          heading: "2. Input"
          children:
            - id: copydoc
              label: [Copydoc]
              icon: Document.svg
            - id: template
              label: [InDesign, template]
              icon: Blueprint.svg

    # Row 1: guidelines (left) + engine (right)
    - id: row1
      direction: horizontal
      variant: annotation
      children:
        - id: guidelines
          direction: vertical
          padding: 8
          heading: "1. Guidelines"
          children:
            - id: typo
              label: [Typography]
              icon: Document.svg
            - id: spacing_guide
              label: [Spacing]
              icon: Document.svg
            - id: layout_guide
              label: [Layout]
              icon: Document.svg
        - id: engine
          direction: vertical
          padding: 8
          fill_weight: 2
          heading: "3. Engine"
          children:
            - id: format_engine
              label: [Format engine, "A4 / Letter / Legal"]
              icon: Composable.svg
            - id: baseline_validator
              label: [Baseline-grid, validator]
              icon: Rosette with check.svg
            - id: editor_box
              label: [Constrained, editor]
              icon: Screen with code.svg

    # Row 2: export panel (right side)
    - id: row2
      direction: horizontal
      variant: annotation
      children:
        - id: spacer2
          label: []
          sizing_h: hug
        - id: export_panel
          direction: vertical
          padding: 8
          fill_weight: 2
          heading: "4. Export"
          children:
            - id: output_pdf
              label: [PDF]
              variant: highlight
              icon: Document.svg
