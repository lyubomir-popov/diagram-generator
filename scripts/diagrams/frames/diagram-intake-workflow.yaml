engine: v3
title: "Diagram intake workflow"
grid:
  cols: 1
arrows:
  - source: sources
    target: workflow
  - source: workflow
    target: compare
  - source: compare
    target: polish
  - source: polish
    target: final
root:
  id: page
  direction: vertical
  padding: 24
  width: 576
  sizing_w: fixed
  variant: annotation
  children:
    # Dashed input frame with two source boxes
    - id: sources
      level: 2
      direction: horizontal
      padding: 8
      heading: "Rough initial diagram sources"
      children:
        - id: src_chatgpt
          label: [ChatGPT-generated, diagrams]
          icon: AI.svg
          sizing_h: fill
        - id: src_other
          label: ["? Additional rough", source formats, from PMs]

    - id: workflow
      level: 2
      heading: "Agentic workflow"
      label:
        - in this repo
        - {text: "playbook + generators", style: muted}
      icon: Screen with code.svg

    - id: compare
      level: 2
      heading: "Compare mode"
      label:
        - {text: "HTML before / agent / refined", style: muted}
      icon: Document with Magnifying glass.svg

    - id: polish
      level: 2
      heading: "Designer polish"
      label:
        - {text: "manual pass in generated draw.io", style: muted}
      icon: Design.svg

    - id: final
      heading: "Final SVGs"
      label:
        - on-brand deliverables
      variant: highlight
      icon: Storage image.svg
