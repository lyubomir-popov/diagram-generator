engine: v3
title: "Diagram intake workflow"
grid:
  cols: 1
arrows:
  - source: sources
    target: workflow
  - source: workflow
    target: compare
  - source: compare
    target: polish
  - source: polish
    target: final
root:
  id: page
  direction: vertical
  padding: 24
  variant: annotation
  children:
    # Dashed input frame with two source boxes
    - id: sources
      direction: horizontal
      padding: 8
      heading: "Rough initial diagram sources"
      children:
        - id: src_chatgpt
          label: [ChatGPT-generated, diagrams]
          icon: AI.svg
        - id: src_other
          label: ["? Additional rough", source formats, from PMs]

    - id: workflow
      label:
        - {text: Agentic workflow, weight: "700"}
        - in this repo
        - {text: "playbook + generators", fill: "#666666"}
      icon: Screen with code.svg

    - id: compare
      label:
        - {text: Compare mode, weight: "700"}
        - {text: "HTML before / agent / refined", fill: "#666666"}
      icon: Document with Magnifying glass.svg

    - id: polish
      label:
        - {text: Designer polish, weight: "700"}
        - {text: "manual pass in generated draw.io", fill: "#666666"}
      icon: Design.svg

    - id: final
      label:
        - {text: Final SVGs, weight: "700"}
        - on-brand deliverables
      variant: highlight
      icon: Storage image.svg
