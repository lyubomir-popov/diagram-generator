engine: v3
title: "Infrastructure overview"
grid:
  cols: 3
arrows:
  - source: cloud
    target: services
  - source: container
    target: services
  - source: server
    target: services
  - source: services
    target: lockman
  - source: services
    target: monitor
root:
  id: page
  direction: vertical
  padding: 24
  children:
    # Row 0: three standard boxes
    - id: row0
      direction: horizontal
      children:
        - id: cloud
          label: [Cloud]
          icon: Cloud.svg
        - id: container
          label: [Container]
          icon: Container.svg
        - id: server
          label: [Server]
          icon: Server.svg

    # Row 1: dashed wrapper panel spanning all 3 columns
    - id: services
      direction: horizontal
      heading: "Managed services"
      children:
        - id: svc_db
          label: [Database]
          icon: Storage node.svg
        - id: svc_storage
          label: [Storage]
          icon: Storage object.svg
        - id: svc_network
          label: [Network]
          icon: Network.svg

    # Row 2: standard boxes
    - id: row2
      direction: horizontal
      children:
        - id: lockman
          label: [Lock, manager]
          icon: Lock.svg
        - id: monitor
          label: [Monitoring, dashboard]
          icon: Memory.svg
