engine: v3
title: "Diagram generator"
grid:
  cols: 3
  col_gap: 32
  row_gap: 24
  outer_margin: 24
arrows:
  - source: input_panel
    target: engine
  - source: guidelines
    target: engine
  - source: engine
    target: export_panel
root:
  id: page
  direction: vertical
  gap: 24
  padding: 24
  children:
    # Row 0: input panel (right side)
    - id: row0
      direction: horizontal
      gap: 32
      children:
        - id: spacer0
          variant: annotation
          label: []
          sizing_h: hug
        - id: input_panel
          direction: horizontal
          gap: 8
          fill_weight: 2
          heading: "2. Input"
          children:
            - id: sketch
              label: [Rough diagram, sketch]
              icon: Document.svg
            - id: verbal
              label: [Verbal, description]
              icon: Discussion.svg

    # Row 1: guidelines (left) + engine (right)
    - id: row1
      direction: horizontal
      gap: 32
      children:
        - id: guidelines
          gap: 8
          heading: "1. Guidelines"
          children:
            - id: typo
              label: [Typography]
              icon: Document.svg
            - id: spacing_guide
              label: [Spacing]
              icon: Document.svg
            - id: layout_guide
              label: [Layout]
              icon: Document.svg
        - id: engine
          gap: 8
          fill_weight: 2
          heading: "3. Engine"
          children:
            - id: dle
              label: [Design language, engine]
              icon: Composable.svg
            - id: rules
              label: [Rule checker]
              icon: Rosette with check.svg
            - id: editor_box
              label: [Constrained, editor]
              icon: Screen with code.svg

    # Row 2: export panel (right side)
    - id: row2
      direction: horizontal
      gap: 32
      children:
        - id: spacer2
          variant: annotation
          label: []
          sizing_h: hug
        - id: export_panel
          direction: horizontal
          gap: 8
          fill_weight: 2
          heading: "4. Export"
          children:
            - id: output_svg
              variant: highlight
              label: [SVG]
              icon: Document.svg
            - id: output_drawio
              variant: highlight
              label: ["Draw.io native format"]
              icon: Design.svg
