engine: v3
title: "Complex Testcase"
# Source: mermaid structured-beta test case
# Reference: mermaid/examples/complex-testcase.drawio
# 3 parent columns (Planning, Implementation, Delivery)
# Dev team is a nested group inside Implementation
# 4 leaf boxes, 2 arrows
# NO "Build spike" — that is in complex-routing-usecase
grid:
  cols: 3
arrows:
  - source: define
    target: implement
  - source: measure
    target: review
root:
  id: page
  direction: horizontal
  padding: 24
  children:
    - id: planning
      level: 3
      heading: "Planning"
      children:
        - id: define
          label: [Define ingress, pipeline]
        - id: measure
          label: [Measure current, performance]

    - id: implementation

      level: 3
      heading: "Implementation"
      children:
        - id: devteam
          level: 2
          heading: "Dev team"
          children:
            - id: implement
              label: [Implement Ingress, pipeline]

    - id: delivery

      level: 3
      heading: "Delivery"
      justify: space-between
      children:
        - id: review
          label: [Review performance, improvement]
