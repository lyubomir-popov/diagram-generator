engine: v3
title: "AWS high level design"
grid:
  cols: 5
arrows:
  - source: modernisation
    target: tgw
  - source: core
    target: tgw
  - source: security
    target: tgw
  - source: shared_svc
    target: tgw
  - source: tgw
    target: ca
  - source: tgw
    target: customer_gw
  - source: tgw
    target: vpc_accounts
  - source: vpc_prod
    target: ou_maatdb
  - source: vpc_preprod
    target: ou_nomis
  - source: vpc_test
    target: ou_oasys
  - source: vpc_dev
    target: ou_ccr
root:
  id: page
  direction: vertical
  padding: 24
  variant: annotation
  children:
    # Row 0: title
    - id: title
      heading: "AWS Organisations"
      label:
        - High Level Design
      icon: Cloud.svg

    # Row 1: service account panels
    - id: row1
      direction: horizontal
      variant: annotation
      children:
        - id: modernisation
          level: 2
          direction: vertical
          padding: 8
          heading: "Modernisation"
          icon: Cloud.svg
          children:
            - id: mod_lz
              label: [LZ]

        - id: core

          level: 2
          direction: horizontal
          padding: 8
          fill_weight: 2
          heading: "Core"
          icon: Cloud.svg
          children:
            - id: logging
              direction: vertical
              padding: 8
              heading: "Logging"
              icon: Document.svg
              children:
                - id: log_subnets
                  label: ["Subnets: public,", "non-live, live-data"]
                - id: log_tgw
                  label: [TGW]
            - id: network_svc
              direction: vertical
              padding: 8
              heading: "Network Services"
              icon: Networking.svg
              children:
                - id: ns_vpc
                  label: [VPC]
                  icon: Network.svg
                - id: ns_nat
                  label: [NAT gateway]
                  icon: Gateway.svg

        - id: security

          level: 2
          direction: vertical
          padding: 8
          heading: "Security"
          icon: Security.svg
          children:
            - id: sec_subnets
              label: ["Subnets: public,", "non-live, live-data"]
            - id: sec_tgw
              label: [TGW]

        - id: shared_svc

          level: 2
          direction: vertical
          padding: 8
          heading: "Shared-services"
          icon: Cloud support.svg
          children:
            - id: ss_subnets
              label: ["Subnets: public,", "non-live, live-data"]
            - id: ss_tgw
              label: [TGW]

    # Row 2: Transit Gateway hub area
    - id: row2
      direction: horizontal
      variant: annotation
      children:
        - id: vpn_note
          label:
            - {text: "VPN attachments are", style: muted}
            - {text: "associated with", style: muted}
            - {text: "external route table", style: muted}
          sizing_w: hug
        - id: ca
          label: [Certificate, Authority]
          icon: Key.svg
        - id: tgw
          label: [Transit Gateway, "live/non-live RT"]
          icon: Gateway.svg
        - id: vpc_attach_note
          label:
            - {text: "vpc attachment", style: muted}
          variant: annotation
          sizing_w: hug
        - id: customer_gw
          label: [Customer, Gateway]
          icon: Gateway.svg

    # Row 3: VPC accounts (dashed wrapper)
    - id: vpc_accounts
      level: 2
      direction: horizontal
      padding: 8
      heading: "VPC_Accounts"
      icon: Document management.svg
      children:
        - id: vpc_prod
          direction: vertical
          padding: 8
          heading: "core-vpc-production"
          children:
            - id: vpc_prod_bu
              label: [VPC per, business unit]
            - id: vpc_prod_igw
              label: [IGW]
              icon: Globe.svg
        - id: vpc_preprod
          direction: vertical
          padding: 8
          heading: "core-vpc-preprod"
          children:
            - id: vpc_preprod_bu
              label: [VPC per, business unit]
        - id: vpc_test
          direction: vertical
          padding: 8
          heading: "core-vpc-test"
          children:
            - id: vpc_test_bu
              label: [VPC per, business unit]
        - id: vpc_dev
          direction: vertical
          padding: 8
          heading: "core-vpc-dev"
          children:
            - id: vpc_dev_bu
              label: [VPC per, business unit]
        - id: vpc_sandbox
          direction: vertical
          padding: 8
          heading: "core-vpc-sandbox"
          children:
            - id: vpc_sandbox_bu
              label: [VPC per, business unit]

    # Row 4: organisational units
    - id: ous_wrapper
      direction: horizontal
      variant: annotation
      children:
        - id: ou_maatdb
          level: 2
          direction: vertical
          padding: 8
          heading: "OU: MaatDB"
          icon: Document management.svg
          children:
            - id: ou_m_prod
              label: [production]
            - id: ou_m_dev
              label: [development]
        - id: ou_nomis
          level: 2
          direction: vertical
          padding: 8
          heading: "OU: Nomis"
          icon: Document management.svg
          children:
            - id: ou_n_prod
              label: [production]
            - id: ou_n_preprod
              label: [preproduction]
            - id: ou_n_test
              label: [test]
        - id: ou_oasys
          level: 2
          direction: vertical
          padding: 8
          heading: "OU: Oasys"
          icon: Document management.svg
          children:
            - id: ou_o_prod
              label: [production]
            - id: ou_o_test
              label: [test]
        - id: ou_ccr
          level: 2
          direction: vertical
          padding: 8
          heading: "OU: CCR"
          icon: Document management.svg
          children:
            - id: ou_c_prod
              label: [production]
            - id: ou_c_dev
              label: [development]

    # Row 5: Key
    - id: key_note
      label:
        - {text: "Key: Transit Gateway · AWS account · Route Table ·", style: muted}
        - {text: "OU · VPN · Private Link · Route 53 ·", style: muted}
        - {text: "Systems Manager · Subnet · NAT · Certificate Authority", style: muted}
      variant: annotation
      sizing_h: hug
