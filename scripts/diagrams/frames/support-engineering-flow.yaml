engine: v3
title: "Support engineering flow"
meta:
  diagram_type: process_and_workflow
  abstraction_level: container
grid:
  cols: 5
  row_gap: 48
arrows:
  - source: step_problem
    target: step_investigation
  - source: step_investigation
    target: step_analysis
  - source: step_analysis
    target: step_fix
  - source: step_fix
    target: step_result
root:
  id: page
  direction: horizontal
  width: 1440
  sizing_w: fixed
  sizing_h: hug
  children:
    - id: step_problem
      heading: "The problem"
      label:
        - ""
        - "Databases have crawled to a halt. Services are unusably slow."
      sizing_w: fill
      sizing_h: fill

    - id: step_investigation
      heading: "The initial investigation"
      label:
        - ""
        - "Customer believes getent to be the issue. They open a support ticket."
      sizing_w: fill
      sizing_h: fill

    - id: step_analysis
      heading: "Support Engineering analysis"
      label:
        - ""
        - "The issue isn\u2019t a quick package fix. Canonical Support engineers dive deep into the source code."
      sizing_w: fill
      sizing_h: fill

    - id: step_fix
      heading: "The fix"
      label:
        - ""
        - "Canonical Support engineers fix the code in a 12-year-old repo, upstreaming the fix for all. They patch the issue, reducing nearly 49,000 disk reads to a single, fast alternative."
      sizing_w: fill
      sizing_h: fill

    - id: step_result
      heading: "The result"
      label:
        - ""
        - "The databases are all online and back to their desired speed."
      sizing_w: fill
      sizing_h: fill
