<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AWS High Level Design comparison</title>
  <style>
    :root {
      color-scheme: light;
      --page-bg: #f4f1ea;
      --panel-bg: #fffdfa;
      --panel-border: #d6d0c4;
      --text: #1d1b18;
      --muted: #6b655c;
      --accent: #e95420;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #fff4ea, transparent 28%),
        linear-gradient(180deg, #f8f5ef 0%, var(--page-bg) 100%);
    }

    .page {
      width: 2400px;
      min-height: 1080px;
      padding: 32px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      margin-bottom: 24px;
      border-bottom: 2px solid rgba(233, 84, 32, 0.25);
      padding-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 36px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .meta {
      font-size: 18px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 24px;
      align-items: stretch;
    }

    .panel {
      display: flex;
      flex-direction: column;
      min-height: 940px;
      border: 1px solid var(--panel-border);
      background: var(--panel-bg);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.06);
    }

    .panel-title {
      padding: 14px 18px;
      border-bottom: 1px solid var(--panel-border);
      font-size: 22px;
      font-weight: 700;
    }

    .asset-frame {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background:
        linear-gradient(45deg, #f6f2eb 25%, transparent 25%),
        linear-gradient(-45deg, #f6f2eb 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #f6f2eb 75%),
        linear-gradient(-45deg, transparent 75%, #f6f2eb 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    }

    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      background: #ffffff;
    }

    .missing {
      width: 100%;
      height: 100%;
      min-height: 820px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      padding: 24px;
      border: 2px dashed rgba(233, 84, 32, 0.45);
      background: rgba(255, 255, 255, 0.88);
      text-align: center;
    }

    .missing-label {
      font-size: 28px;
      font-weight: 700;
    }

    .missing-path {
      font-size: 20px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <h1>AWS High Level Design</h1>
      <div class="meta">Before • Agent-generated • Manually refined</div>
    </header>
    <section class="grid">
      <section class="panel"><div class="panel-title">Before</div><div class="asset-frame"><img src="../../1.input/complex-tests/1.jpg" alt="Before" /></div></section>
      <section class="panel"><div class="panel-title">Agent-generated</div><div class="asset-frame"><img src="../../2.output/svg/aws-hld-onbrand-v2.svg" alt="Agent-generated" /></div></section>
      <section class="panel"><div class="panel-title">Manually refined</div><div class="asset-frame"><div class="missing"><div class="missing-label">Missing manually refined</div><div class="missing-path">Drop a manually refined raster into diagrams/2.output/draw.io/manually-edited/raster/ named aws-hld-onbrand.&lt;jpg|png|svg&gt;</div></div></div></section>
    </section>
  </main>
</body>
</html>
