  <text font-family="Ubuntu Sans">
    <tspan x="48" y="64.92" font-size="18" font-weight="700" fill="#000000">The query (Q): the &quot;question&quot;</tspan>
  </text>
  <rect x="144" y="96" width="48" height="48" fill="#F3F3F3" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="144" y1="116" x2="192" y2="116" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="160" y1="116" x2="160" y2="144" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="176" y1="116" x2="176" y2="144" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="144" y1="125" x2="192" y2="125" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="144" y1="134" x2="192" y2="134" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text x="168" y="110.08" text-anchor="middle" font-family="Ubuntu Sans" font-size="12" font-weight="700" fill="#000000">Q</text>
  <rect x="48" y="184" width="240" height="64" fill="#F3F3F3" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text font-family="Ubuntu Sans">
    <tspan x="56" y="208.92" font-size="18" font-weight="400" fill="#000000">Ubuntu:</tspan>
  </text>
  <text font-family="Ubuntu Sans">
    <tspan x="312" y="208.92" font-size="18" font-weight="400" fill="#666666">I am a noun at the start of a</tspan>
    <tspan x="312" y="232.92" font-size="18" font-weight="400" fill="#666666">sentence followed by a colon.</tspan>
  </text>
  <text font-family="Ubuntu Sans">
    <tspan x="48" y="296.92" font-size="18" font-weight="400" fill="#666666">I am a noun at the start of a sentence followed</tspan>
    <tspan x="48" y="320.92" font-size="18" font-weight="400" fill="#666666">by a colon. I am likely a subject being defined.</tspan>
    <tspan x="48" y="344.92" font-size="18" font-weight="400" fill="#666666">What in this sentence explains what I am?</tspan>
  </text>
  <text font-family="Ubuntu Sans">
    <tspan x="912" y="64.92" font-size="18" font-weight="700" fill="#000000">The keys (K): the &quot;advertisements&quot;</tspan>
  </text>
  <rect x="1296" y="96" width="48" height="48" fill="#F3F3F3" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="1296" y1="116" x2="1344" y2="116" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="1312" y1="116" x2="1312" y2="144" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="1328" y1="116" x2="1328" y2="144" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="1296" y1="125" x2="1344" y2="125" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="1296" y1="134" x2="1344" y2="134" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text x="1320" y="110.08" text-anchor="middle" font-family="Ubuntu Sans" font-size="12" font-weight="700" fill="#000000">K</text>
  <rect x="912" y="184" width="192" height="64" fill="#000000" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text font-family="Ubuntu Sans">
    <tspan x="920" y="208.92" font-size="18" font-weight="400" fill="#FFFFFF">Linux</tspan>
  </text>
  <rect x="1120" y="184" width="192" height="64" fill="#FFFFFF" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text font-family="Ubuntu Sans">
    <tspan x="1128" y="208.92" font-size="18" font-weight="400" fill="#000000">for</tspan>
  </text>
  <rect x="1328" y="184" width="192" height="64" fill="#F3F3F3" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text font-family="Ubuntu Sans">
    <tspan x="1336" y="208.92" font-size="18" font-weight="400" fill="#000000">human</tspan>
  </text>
  <rect x="1536" y="184" width="192" height="64" fill="#FFFFFF" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text font-family="Ubuntu Sans">
    <tspan x="1544" y="208.92" font-size="18" font-weight="400" fill="#000000">beings</tspan>
  </text>
  <text font-family="Ubuntu Sans">
    <tspan x="912" y="296.92" font-size="18" font-weight="400" fill="#666666">I am a technical</tspan>
    <tspan x="912" y="320.92" font-size="18" font-weight="400" fill="#666666">OS kernel</tspan>
    <tspan x="912" y="344.92" font-size="18" font-weight="400" fill="#666666">category.</tspan>
  </text>
  <text font-family="Ubuntu Sans">
    <tspan x="1120" y="296.92" font-size="18" font-weight="400" fill="#666666">I am a preposition</tspan>
    <tspan x="1120" y="320.92" font-size="18" font-weight="400" fill="#666666">indicating a target</tspan>
    <tspan x="1120" y="344.92" font-size="18" font-weight="400" fill="#666666">audience.</tspan>
  </text>
  <text font-family="Ubuntu Sans">
    <tspan x="1328" y="296.92" font-size="18" font-weight="400" fill="#666666">I am the adjective</tspan>
    <tspan x="1328" y="320.92" font-size="18" font-weight="400" fill="#666666">that narrows the</tspan>
    <tspan x="1328" y="344.92" font-size="18" font-weight="400" fill="#666666">species or type.</tspan>
  </text>
  <text font-family="Ubuntu Sans">
    <tspan x="1536" y="296.92" font-size="18" font-weight="400" fill="#666666">I am the plural noun,</tspan>
    <tspan x="1536" y="320.92" font-size="18" font-weight="400" fill="#666666">the object of the</tspan>
    <tspan x="1536" y="344.92" font-size="18" font-weight="400" fill="#666666">audience.</tspan>
  </text>
  <text font-family="Ubuntu Sans">
    <tspan x="48" y="616.92" font-size="18" font-weight="700" fill="#000000">The match (QK^T): the &quot;relevance check&quot;</tspan>
  </text>
  <rect x="432" y="648" width="48" height="48" fill="#F3F3F3" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="432" y1="668" x2="480" y2="668" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="448" y1="668" x2="448" y2="696" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="464" y1="668" x2="464" y2="696" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="432" y1="677" x2="480" y2="677" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="432" y1="686" x2="480" y2="686" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text x="456" y="662.08" text-anchor="middle" font-family="Ubuntu Sans" font-size="12" font-weight="700" fill="#000000">QK</text>
  <rect x="48" y="744" width="192" height="64" fill="#000000" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text font-family="Ubuntu Sans">
    <tspan x="56" y="768.92" font-size="18" font-weight="400" fill="#FFFFFF">Linux</tspan>
  </text>
  <rect x="256" y="744" width="192" height="64" fill="#FFFFFF" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text font-family="Ubuntu Sans">
    <tspan x="264" y="768.92" font-size="18" font-weight="400" fill="#000000">for</tspan>
  </text>
  <rect x="464" y="744" width="192" height="64" fill="#F3F3F3" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text font-family="Ubuntu Sans">
    <tspan x="472" y="768.92" font-size="18" font-weight="400" fill="#000000">human</tspan>
  </text>
  <rect x="672" y="744" width="192" height="64" fill="#FFFFFF" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text font-family="Ubuntu Sans">
    <tspan x="680" y="768.92" font-size="18" font-weight="400" fill="#000000">beings</tspan>
  </text>
  <text font-family="Ubuntu Sans">
    <tspan x="48" y="856.92" font-size="18" font-weight="400" fill="#666666">Best semantic match:</tspan>
    <tspan x="48" y="880.92" font-size="18" font-weight="400" fill="#666666">the likely subject</tspan>
    <tspan x="48" y="904.92" font-size="18" font-weight="400" fill="#666666">being defined.</tspan>
  </text>
  <text font-family="Ubuntu Sans">
    <tspan x="256" y="856.92" font-size="18" font-weight="400" fill="#666666">Relevant as context,</tspan>
    <tspan x="256" y="880.92" font-size="18" font-weight="400" fill="#666666">but not the thing</tspan>
    <tspan x="256" y="904.92" font-size="18" font-weight="400" fill="#666666">being defined.</tspan>
  </text>
  <text font-family="Ubuntu Sans">
    <tspan x="464" y="856.92" font-size="18" font-weight="400" fill="#666666">Useful modifier,</tspan>
    <tspan x="464" y="880.92" font-size="18" font-weight="400" fill="#666666">but not stronger than</tspan>
    <tspan x="464" y="904.92" font-size="18" font-weight="400" fill="#666666">the main noun.</tspan>
  </text>
  <text font-family="Ubuntu Sans">
    <tspan x="672" y="856.92" font-size="18" font-weight="400" fill="#666666">Part of the phrase,</tspan>
    <tspan x="672" y="880.92" font-size="18" font-weight="400" fill="#666666">yet less direct than</tspan>
    <tspan x="672" y="904.92" font-size="18" font-weight="400" fill="#666666">the kernel word.</tspan>
  </text>
  <circle cx="80" cy="1008" r="12" fill="#FFFFFF" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text font-family="Ubuntu Sans">
    <tspan x="100" y="1016.92" font-size="18" font-weight="400" fill="#666666">Low</tspan>
  </text>
  <circle cx="212" cy="1008" r="12" fill="#F3F3F3" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text font-family="Ubuntu Sans">
    <tspan x="232" y="1016.92" font-size="18" font-weight="400" fill="#666666">Medium</tspan>
  </text>
  <circle cx="388" cy="1008" r="12" fill="#000000" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text font-family="Ubuntu Sans">
    <tspan x="408" y="1016.92" font-size="18" font-weight="400" fill="#666666">High</tspan>
  </text>
  <text font-family="Ubuntu Sans">
    <tspan x="912" y="616.92" font-size="18" font-weight="700" fill="#000000">The value (V): the &quot;knowledge transfer&quot;</tspan>
  </text>
  <rect x="912" y="648" width="48" height="48" fill="#F3F3F3" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="912" y1="668" x2="960" y2="668" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="928" y1="668" x2="928" y2="696" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="944" y1="668" x2="944" y2="696" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="912" y1="677" x2="960" y2="677" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="912" y1="686" x2="960" y2="686" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text x="936" y="662.08" text-anchor="middle" font-family="Ubuntu Sans" font-size="12" font-weight="700" fill="#000000">Q</text>
  <rect x="1136" y="648" width="48" height="48" fill="#F3F3F3" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="1136" y1="668" x2="1184" y2="668" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="1152" y1="668" x2="1152" y2="696" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="1168" y1="668" x2="1168" y2="696" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="1136" y1="677" x2="1184" y2="677" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <line x1="1136" y1="686" x2="1184" y2="686" fill="none" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text x="1160" y="662.08" text-anchor="middle" font-family="Ubuntu Sans" font-size="12" font-weight="700" fill="#000000">K</text>
  <rect x="912" y="744" width="192" height="64" fill="#F3F3F3" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text font-family="Ubuntu Sans">
    <tspan x="920" y="768.92" font-size="18" font-weight="400" fill="#000000">Ubuntu:</tspan>
  </text>
  <rect x="1136" y="744" width="192" height="64" fill="#000000" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text font-family="Ubuntu Sans">
    <tspan x="1144" y="768.92" font-size="18" font-weight="400" fill="#FFFFFF">Linux</tspan>
  </text>
  <text font-family="Ubuntu Sans">
    <tspan x="1360" y="768.92" font-size="18" font-weight="400" fill="#666666">Strongest meaning comes from &quot;Linux&quot;,</tspan>
    <tspan x="1360" y="792.92" font-size="18" font-weight="400" fill="#666666">with extra audience context from</tspan>
    <tspan x="1360" y="816.92" font-size="18" font-weight="400" fill="#666666">&quot;human beings&quot;.</tspan>
  </text>
  <rect x="960" y="848" width="336" height="64" fill="#F3F3F3" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text font-family="Ubuntu Sans">
    <tspan x="968" y="872.92" font-size="18" font-weight="700" fill="#000000">Value transfer (V)</tspan>
  </text>
  <text font-family="Ubuntu Sans">
    <tspan x="912" y="960.92" font-size="18" font-weight="400" fill="#666666">Now that the model knows &quot;Linux&quot; is the most relevant</tspan>
    <tspan x="912" y="984.92" font-size="18" font-weight="400" fill="#666666">word, it takes the value step to transfer the actual</tspan>
    <tspan x="912" y="1008.92" font-size="18" font-weight="400" fill="#666666">semantic meaning of &quot;Linux&quot; and &quot;human beings&quot; into</tspan>
    <tspan x="912" y="1032.92" font-size="18" font-weight="400" fill="#666666">the representation of &quot;Ubuntu&quot;.</tspan>
  </text>
</svg>
