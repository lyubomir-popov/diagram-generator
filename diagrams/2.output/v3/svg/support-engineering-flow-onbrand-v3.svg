<svg xmlns="http://www.w3.org/2000/svg" width="1464" height="280" viewBox="0 0 1464 280" xml:space="preserve">
  <rect width="1464" height="280" fill="#FFFFFF" />
  <g data-component-id="page">
  <rect x="0" y="0" width="1464" height="280" fill="transparent" stroke="none" stroke-width="1" stroke-miterlimit="10" pointer-events="none" />
  </g>
  <g data-component-id="step_problem">
  <rect x="24" y="24" width="264" height="136" fill="transparent" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text font-family="Ubuntu Sans">
    <tspan x="32" y="48.92" font-size="18" font-weight="700" fill="#000000">The problem</tspan>
    <tspan x="32" y="72.92" font-size="18" font-weight="400" fill="#000000"></tspan>
    <tspan x="32" y="96.92" font-size="18" font-weight="400" fill="#000000">Databases have crawled to a</tspan>
    <tspan x="32" y="120.92" font-size="18" font-weight="400" fill="#000000">halt. Services are unusably</tspan>
    <tspan x="32" y="144.92" font-size="18" font-weight="400" fill="#000000">slow.</tspan>
  </text>
  </g>
  <g data-component-id="step_investigation">
  <rect x="312" y="24" width="264" height="136" fill="transparent" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text font-family="Ubuntu Sans">
    <tspan x="320" y="48.92" font-size="18" font-weight="700" fill="#000000">The initial investigation</tspan>
    <tspan x="320" y="72.92" font-size="18" font-weight="400" fill="#000000"></tspan>
    <tspan x="320" y="96.92" font-size="18" font-weight="400" fill="#000000">Customer believes getent to</tspan>
    <tspan x="320" y="120.92" font-size="18" font-weight="400" fill="#000000">be the issue. They open a</tspan>
    <tspan x="320" y="144.92" font-size="18" font-weight="400" fill="#000000">support ticket.</tspan>
  </text>
  </g>
  <g data-component-id="step_analysis">
  <rect x="600" y="24" width="264" height="160" fill="transparent" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text font-family="Ubuntu Sans">
    <tspan x="608" y="48.92" font-size="18" font-weight="700" fill="#000000">Support Engineering analysis</tspan>
    <tspan x="608" y="72.92" font-size="18" font-weight="400" fill="#000000"></tspan>
    <tspan x="608" y="96.92" font-size="18" font-weight="400" fill="#000000">The issue isn’t a quick package</tspan>
    <tspan x="608" y="120.92" font-size="18" font-weight="400" fill="#000000">fix. Canonical Support</tspan>
    <tspan x="608" y="144.92" font-size="18" font-weight="400" fill="#000000">engineers dive deep into the</tspan>
    <tspan x="608" y="168.92" font-size="18" font-weight="400" fill="#000000">source code.</tspan>
  </text>
  </g>
  <g data-component-id="step_fix">
  <rect x="888" y="24" width="264" height="232" fill="transparent" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text font-family="Ubuntu Sans">
    <tspan x="896" y="48.92" font-size="18" font-weight="700" fill="#000000">The fix</tspan>
    <tspan x="896" y="72.92" font-size="18" font-weight="400" fill="#000000"></tspan>
    <tspan x="896" y="96.92" font-size="18" font-weight="400" fill="#000000">Canonical Support engineers</tspan>
    <tspan x="896" y="120.92" font-size="18" font-weight="400" fill="#000000">fix the code in a 12-year-old</tspan>
    <tspan x="896" y="144.92" font-size="18" font-weight="400" fill="#000000">repo, upstreaming the fix for</tspan>
    <tspan x="896" y="168.92" font-size="18" font-weight="400" fill="#000000">all. They patch the issue,</tspan>
    <tspan x="896" y="192.92" font-size="18" font-weight="400" fill="#000000">reducing nearly 49,000 disk</tspan>
    <tspan x="896" y="216.92" font-size="18" font-weight="400" fill="#000000">reads to a single, fast</tspan>
    <tspan x="896" y="240.92" font-size="18" font-weight="400" fill="#000000">alternative.</tspan>
  </text>
  </g>
  <g data-component-id="step_result">
  <rect x="1176" y="24" width="264" height="136" fill="transparent" stroke="#000000" stroke-width="1" stroke-miterlimit="10" />
  <text font-family="Ubuntu Sans">
    <tspan x="1184" y="48.92" font-size="18" font-weight="700" fill="#000000">The result</tspan>
    <tspan x="1184" y="72.92" font-size="18" font-weight="400" fill="#000000"></tspan>
    <tspan x="1184" y="96.92" font-size="18" font-weight="400" fill="#000000">The databases are all online</tspan>
    <tspan x="1184" y="120.92" font-size="18" font-weight="400" fill="#000000">and back to their desired</tspan>
    <tspan x="1184" y="144.92" font-size="18" font-weight="400" fill="#000000">speed.</tspan>
  </text>
  </g>
  <g data-component-id="step_problem-&gt;step_investigation">
  <line x1="288" y1="92" x2="301.1592" y2="92" fill="none" stroke="#E95420" stroke-width="1" stroke-miterlimit="10" />
  <polygon points="301.1592,89.0947 312,92 301.1592,94.9053" fill="#E95420" />
  </g>
  <g data-component-id="step_investigation-&gt;step_analysis">
  <line x1="576" y1="92" x2="600" y2="92" fill="none" stroke="#E95420" stroke-width="1" stroke-miterlimit="10" />
  <line x1="600" y1="92" x2="600" y2="93.1592" fill="none" stroke="#E95420" stroke-width="1" stroke-miterlimit="10" />
  <polygon points="597.0947,93.1592 600,104 602.9053,93.1592" fill="#E95420" />
  </g>
  <g data-component-id="step_analysis-&gt;step_fix">
  <line x1="864" y1="104" x2="888" y2="104" fill="none" stroke="#E95420" stroke-width="1" stroke-miterlimit="10" />
  <line x1="888" y1="104" x2="888" y2="129.1592" fill="none" stroke="#E95420" stroke-width="1" stroke-miterlimit="10" />
  <polygon points="885.0947,129.1592 888,140 890.9053,129.1592" fill="#E95420" />
  </g>
  <g data-component-id="step_fix-&gt;step_result">
  <line x1="1152" y1="140" x2="1176" y2="140" fill="none" stroke="#E95420" stroke-width="1" stroke-miterlimit="10" />
  <line x1="1176" y1="140" x2="1176" y2="102.8408" fill="none" stroke="#E95420" stroke-width="1" stroke-miterlimit="10" />
  <polygon points="1173.0947,102.8408 1176,92 1178.9053,102.8408" fill="#E95420" />
  </g>
</svg>
